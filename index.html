<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>النظام الترددي اللغوي — ترددات شخصية لكل مستخدم</title>

  <style>
    body {
      font-family: "Cairo", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #161b22;
      border-radius: 14px;
      padding: 28px;
      border: 1px solid #30363d;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      color: #58a6ff;
      margin-bottom: 20px;
      font-size: 2rem;
    }

    h2 {
      color: #79c0ff;
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-top: 10px;
      margin-bottom: 4px;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 4px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #e6edf3;
      font-size: 1rem;
      height: 120px;
      resize: vertical;
    }

    input[type="number"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #e6edf3;
      font-size: 0.95rem;
    }

    button {
      margin-top: 12px;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: #238636;
      color: white;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { background: #2ea043; }

    .copy-btn {
      background: #4ade80;
      color: #0d1117;
    }
    .copy-btn:hover { background: #22c55e; }

    .output {
      margin-top: 10px;
      padding: 12px;
      background: #0d1117;
      border: 1px dashed #30363d;
      border-radius: 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .row { display: grid; grid-template-columns: 1fr; gap: 16px; }
    @media (min-width: 860px) { .row { grid-template-columns: 1fr 1fr; } }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: #6e7681;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>النظام الترددي اللغوي — ترددات شخصية لكل مستخدم</h1>

    <label>مفتاح المستخدم (رقم كبير مشترك بين المرسل والمستقبل):</label>
    <input id="userKey" type="number" value="123456789">

    <div class="row">

      <div>
        <h2>تحويل جملة إلى ترددات</h2>
        <label>أدخل نصًا عربيًا:</label>
        <textarea id="sentenceInput" placeholder="أدخل نصًا عربيًا هنا..."></textarea>
        <button onclick="encodeSentence()">تحويل</button>
        <button class="copy-btn" onclick="copyAllFreqs()">نسخ جميع الترددات</button>
        <div class="output" id="encodeOutput">—</div>
      </div>

      <div>
        <h2>تحويل ترددات إلى جملة</h2>
        <label>أدخل الترددات (كل تردد في سطر):</label>
        <textarea id="freqListInput" placeholder="مثال:
1915265
19757432
28746170"></textarea>
        <button onclick="decodeFreqList()">تحويل</button>
        <div class="output" id="decodeOutput">—</div>
      </div>

    </div>

    <div class="footer">
      م: رأفت عمر
    </div>
  </div>

<script>
  // إعدادات المجال
  const B = 32;
  const LMAX = 12;   // يدعم كلمات طويلة جدًا
  const f0 = 100000;
  const df = 1;

  // التطبيع العربي
  function normalizeArabic(s) {
    return (s || "")
      .replace(/[إأآ]/g, "ا")
      .replace(/ى/g, "ي")
      .replace(/ؤ/g, "و")
      .replace(/ئ/g, "ي")
      .replace(/ة/g, "ه");
  }

  // جدول الحروف
  const indexToChar = {
    0:"",1:"ا",2:"ب",3:"ت",4:"ث",5:"ج",6:"ح",7:"خ",
    8:"د",9:"ذ",10:"ر",11:"ز",12:"س",13:"ش",14:"ص",
    15:"ض",16:"ط",17:"ظ",18:"ع",19:"غ",20:"ف",21:"ق",
    22:"ك",23:"ل",24:"م",25:"ن",26:"ه",27:"و",28:"ي"
  };

  const charToIndex = {};
  for (const [i,ch] of Object.entries(indexToChar)) {
    if (ch) charToIndex[ch] = parseInt(i, 10);
  }

  // تقسيم الكلمة إلى بلوكات بطول LMAX
  function splitWord(word) {
    const blocks = [];
    for (let i = 0; i < word.length; i += LMAX) {
      blocks.push(word.slice(i, i + LMAX));
    }
    return blocks;
  }

  // تحويل بلوك إلى كود عددي
  function wordToCode(word){
    const c = new Array(LMAX).fill(0);
    let pos = 0;
    for (let i = word.length - 1; i >= 0; i--){
      const idx = charToIndex[word[i]];
      if (idx === undefined) throw new Error("حرف غير مدعوم: " + word[i]);
      c[pos++] = idx;
    }
    let C = 0n;
    for (let i = 0; i < LMAX; i++){
      C += BigInt(c[i]) * (BigInt(B) ** BigInt(i));
    }
    return C;
  }

  // تحويل كود عددي إلى بلوك
  function codeToWord(Cbig){
    let C = BigInt(Cbig);
    const digits = [];
    for (let i = 0; i < LMAX; i++){
      digits.push(Number(C % BigInt(B)));
      C /= BigInt(B);
    }
    let w = "";
    for (let i = LMAX - 1; i >= 0; i--){
      w += indexToChar[digits[i]] || "";
    }
    return w;
  }

  // ترميز جملة إلى ترددات مع مفتاح مستخدم
  function encodeSentence(){
    const keyStr = document.getElementById("userKey").value || "0";
    const key = BigInt(keyStr);

    const sentenceRaw = document.getElementById("sentenceInput").value.trim();
    const sentence = normalizeArabic(sentenceRaw);
    if (!sentence) {
      document.getElementById("encodeOutput").textContent = "لا يوجد نص.";
      return;
    }

    const words = sentence.split(/\s+/);
    let allFreqs = [];

    words.forEach(word => {
      const blocks = splitWord(word);
      blocks.forEach(block => {
        const C = wordToCode(block);   // كود الكلمة
        const C2 = C ^ key;            // دمج المفتاح الشخصي
        const f = f0 + Number(C2) * df;
        allFreqs.push(f);
      });
    });

    document.getElementById("encodeOutput").textContent =
      allFreqs.join("\n");

    window.lastFreqList = allFreqs;
  }

  // نسخ جميع الترددات
  function copyAllFreqs(){
    if (!window.lastFreqList || window.lastFreqList.length === 0) return;

    const text = window.lastFreqList.join("\n");

    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text);
      return;
    }

    const temp = document.createElement("textarea");
    temp.value = text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    document.body.removeChild(temp);
  }

  // فك الترددات إلى جملة مع نفس مفتاح المستخدم
  function decodeFreqList(){
    const keyStr = document.getElementById("userKey").value || "0";
    const key = BigInt(keyStr);

    const input = document.getElementById("freqListInput").value.trim();
    if (!input) {
      document.getElementById("decodeOutput").textContent = "لا توجد ترددات.";
      return;
    }

    const lines = input.split(/\n+/);
    const words = [];

    lines.forEach(line => {
      const t = line.trim();
      if (!t) return;

      const freq = Number(t);
      if (isNaN(freq)) return;

      const C2 = BigInt(Math.round((freq - f0) / df)); // الكود بعد التشفير
      const C = C2 ^ key;                              // إزالة المفتاح
      const block = codeToWord(C);
      words.push(block);
    });

    document.getElementById("decodeOutput").textContent =
      words.join(" ");
  }
</script>

</body>
</html>
