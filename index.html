<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>النظام الترددي اللغوي — معامل اختصار مشترك أكبر</title>

  <style>
    body {
      font-family: "Cairo", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #161b22;
      border-radius: 14px;
      padding: 28px;
      border: 1px solid #30363d;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      color: #58a6ff;
      margin-bottom: 20px;
      font-size: 2rem;
    }

    h2 {
      color: #79c0ff;
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-top: 10px;
      margin-bottom: 4px;
      font-size: 0.95rem;
    }

    textarea, input[type="number"], input[type="text"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #e6edf3;
      font-size: 0.95rem;
      margin-top: 4px;
    }

    textarea {
      height: 120px;
      resize: vertical;
    }

    button {
      margin-top: 12px;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: #238636;
      color: white;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { background: #2ea043; }

    .copy-btn {
      background: #4ade80;
      color: #0d1117;
    }
    .copy-btn:hover { background: #22c55e; }

    .output {
      margin-top: 10px;
      padding: 12px;
      background: #0d1117;
      border: 1px dashed #30363d;
      border-radius: 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .row { display: grid; grid-template-columns: 1fr; gap: 16px; }
    @media (min-width: 860px) { .row { grid-template-columns: 1fr 1fr; } }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: #6e7681;
      font-size: 0.9rem;
    }

    .hint {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-top: 4px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>النظام الترددي اللغوي — معامل الاختصار المشترك الأكبر</h1>

    <label>مفتاح المستخدم (رقم كبير مشترك بين المرسل والمستقبل):</label>
    <input id="userKey" type="number" value="123456789">

    <label>معامل الاختصار المشترك الأكبر (يُحسب من الترددات):</label>
    <input id="gcdFactor" type="text" readonly value="1">
    <div class="hint">بعد كتابة الجملة والضغط على "تحويل"، سيُحسب هنا أكبر معامل اختصار مشترك لكل الترددات.</div>

    <div class="row">

      <div>
        <h2>تحويل جملة إلى ترددات مختصرة</h2>
        <label>أدخل نصًا عربيًا:</label>
        <textarea id="sentenceInput" placeholder="أدخل نصًا عربيًا هنا..."></textarea>
        <button onclick="encodeSentence()">تحويل</button>
        <button class="copy-btn" onclick="copyAllFreqs()">نسخ الترددات المختصرة</button>
        <div class="output" id="encodeOutput">—</div>
      </div>

      <div>
        <h2>تحويل ترددات مختصرة إلى جملة</h2>
        <label>أدخل الترددات المختصرة (كل تردد في سطر):</label>
        <textarea id="freqListInput" placeholder="كل تردد مختصر في سطر..."></textarea>

        <label>معامل الاختصار المستخدم (نفس القيمة الظاهرة في الأعلى عند الترميز):</label>
        <input id="gcdInput" type="text" value="1">

        <button onclick="decodeFreqList()">تحويل</button>
        <div class="output" id="decodeOutput">—</div>
      </div>

    </div>

    <div class="footer">
      م: رأفت عمر — نسخة معامل الاختصار المشترك الأكبر
    </div>
  </div>

<script>
  const B = 32;
  const LMAX = 12;
  const f0 = 100000n;
  const df = 1n;

  function normalizeArabic(s) {
    return (s || "")
      .replace(/[إأآ]/g, "ا")
      .replace(/ى/g, "ي")
      .replace(/ؤ/g, "و")
      .replace(/ئ/g, "ي")
      .replace(/ة/g, "ه");
  }

  const indexToChar = {
    0:"",1:"ا",2:"ب",3:"ت",4:"ث",5:"ج",6:"ح",7:"خ",
    8:"د",9:"ذ",10:"ر",11:"ز",12:"س",13:"ش",14:"ص",
    15:"ض",16:"ط",17:"ظ",18:"ع",19:"غ",20:"ف",21:"ق",
    22:"ك",23:"ل",24:"م",25:"ن",26:"ه",27:"و",28:"ي"
  };

  const charToIndex = {};
  for (const [i,ch] of Object.entries(indexToChar)) {
    if (ch) charToIndex[ch] = parseInt(i, 10);
  }

  function splitWord(word) {
    const blocks = [];
    for (let i = 0; i < word.length; i += LMAX) {
      blocks.push(word.slice(i, i + LMAX));
    }
    return blocks;
  }

  function wordToCode(word){
    const c = new Array(LMAX).fill(0);
    let pos = 0;
    for (let i = word.length - 1; i >= 0; i--){
      const idx = charToIndex[word[i]];
      if (idx === undefined) throw new Error("حرف غير مدعوم: " + word[i]);
      c[pos++] = idx;
    }
    let C = 0n;
    for (let i = 0; i < LMAX; i++){
      C += BigInt(c[i]) * (BigInt(B) ** BigInt(i));
    }
    return C;
  }

  function codeToWord(Cbig){
    let C = BigInt(Cbig);
    const digits = [];
    for (let i = 0; i < LMAX; i++){
      digits.push(Number(C % BigInt(B)));
      C /= BigInt(B);
    }
    let w = "";
    for (let i = LMAX - 1; i >= 0; i--){
      w += indexToChar[digits[i]] || "";
    }
    return w;
  }

  function gcdBigInt(a, b) {
    a = a < 0n ? -a : a;
    b = b < 0n ? -b : b;
    while (b !== 0n) {
      const t = b;
      b = a % b;
      a = t;
    }
    return a;
  }

  function gcdArrayBigInt(arr) {
    if (arr.length === 0) return 1n;
    let g = arr[0] < 0n ? -arr[0] : arr[0];
    for (let i = 1; i < arr.length; i++) {
      g = gcdBigInt(g, arr[i]);
      if (g === 1n) break;
    }
    return g === 0n ? 1n : g;
  }

  let lastK = 1n;

  function encodeSentence(){
    const key = BigInt(document.getElementById("userKey").value || "0");
    const sentenceRaw = document.getElementById("sentenceInput").value.trim();
    const sentence = normalizeArabic(sentenceRaw);

    if (!sentence) {
      document.getElementById("encodeOutput").textContent = "لا يوجد نص.";
      document.getElementById("gcdFactor").value = "1";
      lastK = 1n;
      return;
    }

    const words = sentence.split(/\s+/);
    const fullFreqs = [];

    words.forEach(word => {
      const blocks = splitWord(word);
      blocks.forEach(block => {
        const C  = wordToCode(block);
        const C2 = C ^ key;
        const fFull = f0 + C2 * df;   // تردد كامل لكل بلوك
        fullFreqs.push(fFull);
      });
    });

    if (fullFreqs.length === 0) {
      document.getElementById("encodeOutput").textContent = "لا توجد ترددات.";
      document.getElementById("gcdFactor").value = "1";
      lastK = 1n;
      return;
    }

    const K = gcdArrayBigInt(fullFreqs);   // المعامل المشترك الأكبر
    lastK = K;
    document.getElementById("gcdFactor").value = K.toString();
    document.getElementById("gcdInput").value = K.toString();

    const shortFreqs = fullFreqs.map(f => (f / K).toString());

    document.getElementById("encodeOutput").textContent =
      shortFreqs.join("\n");

    window.lastFreqList = shortFreqs;
  }

  function copyAllFreqs(){
    if (!window.lastFreqList || window.lastFreqList.length === 0) return;
    const text = window.lastFreqList.join("\n");
    navigator.clipboard.writeText(text);
  }

  function decodeFreqList(){
    const key = BigInt(document.getElementById("userKey").value || "0");
    const Kstr = document.getElementById("gcdInput").value.trim() || "1";
    let K;
    try {
      K = BigInt(Kstr);
      if (K === 0n) K = 1n;
    } catch {
      K = 1n;
    }

    const input = document.getElementById("freqListInput").value.trim();
    if (!input) {
      document.getElementById("decodeOutput").textContent = "لا توجد ترددات.";
      return;
    }

    const lines = input.split(/\n+/);
    const words = [];

    lines.forEach(line => {
      const t = line.trim();
      if (!t) return;

      let fShort;
      try {
        fShort = BigInt(t);
      } catch {
        return;
      }

      const fFull = fShort * K;
      const C2 = (fFull - f0) / df;
      const C  = C2 ^ key;
      const block = codeToWord(C);
      words.push(block);
    });

    document.getElementById("decodeOutput").textContent =
      words.join(" ");
  }
</script>

</body>
</html>
