<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>النظام الرسمي BRHM-LNS</title>
  <style>
    body {font-family:"Cairo",sans-serif;background:#0d1117;color:#e6edf3;margin:0;padding:0;}
    .container {max-width:1000px;margin:40px auto;background:#161b22;border-radius:14px;padding:28px;border:1px solid #30363d;}
    h1 {text-align:center;color:#58a6ff;margin-bottom:20px;}
    h2 {color:#79c0ff;margin-bottom:10px;}
    label {margin-top:10px;display:block;}
    textarea,input {width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;}
    button {margin-top:12px;padding:10px 18px;border-radius:8px;border:none;background:#238636;color:white;cursor:pointer;}
    button:hover {background:#2ea043;}
    .output {margin-top:10px;padding:12px;background:#0d1117;border:1px dashed #30363d;border-radius:8px;font-family:"JetBrains Mono",monospace;}
    table {width:100%;border-collapse:collapse;margin-top:10px;}
    th,td {border:1px solid #30363d;padding:8px;text-align:center;}
    th {background:#21262d;color:#79c0ff;}
    .footer {text-align:center;margin-top:30px;color:#6e7681;}
  </style>
</head>
<body>
<div class="container">
  <h1>النظام الرسمي BRHM-LNS</h1>

  <h2>إعدادات المجال الترددي (مفتاح المستخدم)</h2>
  <label>بداية المجال f0:</label>
  <input id="f0Input" type="number" value="100000">
  <label>خطوة التردد Δf:</label>
  <input id="dfInput" type="number" value="1">

  <h2>تحويل جملة إلى ترددات</h2>
  <label>أدخل جملة عربية:</label>
  <textarea id="sentenceInput" placeholder="مثال: السلام عليكم ورحمة الله وبركاته"></textarea>
  <button onclick="encodeSentence()">تحويل</button>
  <button onclick="copyAllFreqs()">نسخ جميع الترددات</button>
  <div class="output" id="encodeOutput">—</div>

  <h2>تحويل ترددات إلى جملة</h2>
  <label>أدخل الترددات (كل كلمة في سطر):</label>
  <textarea id="freqListInput"></textarea>
  <button onclick="decodeFreqList()">تحويل</button>
  <div class="output" id="decodeOutput">—</div>

  <div class="footer">م: برهوم — الإصدار الرسمي الأول للنظام</div>
</div>

<script>
  const alphabet = ["ا","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن","ه","و","ي"];
  const base = 28**3; // أساس النظام (رمز = 3 حروف)

  // تحويل رمز (3 حروف) إلى رقم
  function symbolToNumber(sym){
    if(sym.includes("#")) return 0; // رمز النهاية
    let [c1,c2,c3] = sym.split("");
    let i1 = alphabet.indexOf(c1)+1;
    let i2 = alphabet.indexOf(c2)+1;
    let i3 = alphabet.indexOf(c3)+1;
    return i1*28*28 + i2*28 + i3;
  }

  // تحويل رقم إلى رمز (3 حروف)
  function numberToSymbol(num){
    if(num===0) return "#";
    let i1 = Math.floor(num/(28*28));
    let rem = num%(28*28);
    let i2 = Math.floor(rem/28);
    let i3 = rem%28;
    return alphabet[i1-1]+alphabet[i2-1]+alphabet[i3-1];
  }

  // إضافة رمز النهاية #
  function addEndSymbol(word){return word+"#";}

  // تقسيم الكلمة إلى رموز (3 حروف)
  function splitWord(word){
    let w = addEndSymbol(word);
    let blocks=[];
    for(let i=0;i<w.length;i+=3){
      blocks.push(w.slice(i,i+3));
    }
    return blocks;
  }

  // كلمة → BigInt
  function wordToBigInt(word){
    let blocks=splitWord(word);
    let n=0n;
    for(let b of blocks){
      n = n*BigInt(base) + BigInt(symbolToNumber(b));
    }
    return n;
  }

  // BigInt → كلمة
  function bigIntToWord(str){
    let n=BigInt(str);
    let blocks=[];
    while(n>0n){
      let r = n%BigInt(base);
      n = n/BigInt(base);
      blocks.unshift(numberToSymbol(Number(r)));
    }
    return blocks.join("");
  }

  // كلمة → تردد
  function wordToFreq(word,f0,df){
    let N=wordToBigInt(word);
    return Number(f0)+Number(N)*Number(df);
  }

  // تردد → كلمة
  function freqToWord(freq,f0,df){
    let C=Math.round((freq-f0)/df);
    return bigIntToWord(C);
  }

  // واجهة المستخدم
  function encodeSentence(){
    let sentence=document.getElementById("sentenceInput").value.trim();
    let f0=Number(document.getElementById("f0Input").value);
    let df=Number(document.getElementById("dfInput").value);
    let words=sentence.split(/\s+/);
    let allFreqs=[];
    let html="<table><tr><th>الكلمة</th><th>الرموز</th><th>BigInt</th><th>التردد</th></tr>";
    words.forEach(word=>{
      let N=wordToBigInt(word);
      let freq=wordToFreq(word,f0,df);
      allFreqs.push(freq);
      html+=`<tr><td>${word}</td><td>${splitWord(word).join(" | ")}</td><td>${N}</td><td>${freq} Hz</td></tr>`;
    });
    html+="</table>";
    document.getElementById("encodeOutput").innerHTML=html;
    window.lastFreqList=allFreqs;
  }

  function copyAllFreqs(){
    if(!window.lastFreqList) return;
    navigator.clipboard.writeText(window.lastFreqList.join("\n"));
  }

  function decodeFreqList(){
    let f0=Number(document.getElementById("f0Input").value);
    let df=Number(document.getElementById("dfInput").value);
    let input=document.getElementById("freqListInput").value.trim();
    let lines=input.split(/\n+/);
    let words=[];
    lines.forEach(line=>{
      let parts=line.trim().split(/\s+/);
      let blocks=[];
      parts.forEach(p=>{
        let freq=Number(p);
        if(isNaN(freq)) return;
        let word=freqToWord(freq,f0,df);
        blocks.push(word);
      });
      if(blocks.length>0) words.push(blocks.join(" "));
    });
    document.getElementById("decodeOutput").textContent=words.join(" ");
  }
</script>
</body>
</html>
